  .link-content { text-align:right; flex-grow:1; }
  .link-title { font-size:16px; font-weight:700; margin-bottom:4px; color:#fff; }
  .link-desc { font-size:13px; color:#777; }
  .link-arrow { font-size:14px; color:#444; transition:color 0.15s; margin-right:12px; }
